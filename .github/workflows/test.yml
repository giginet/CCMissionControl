name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: xcodebuild -scheme CCMissionControl -configuration Debug build

      - name: Test
        run: |
          xcodebuild test \
            -scheme CCMissionControl \
            -configuration Debug \
            -destination 'platform=macOS' \
            -only-testing:CCMissionControlTests
