name: Release

on:
  release:
    types: [created]

jobs:
  build-and-notarize:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Developer ID certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Set keychain search list
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Archive
        run: |
          xcodebuild archive \
            -scheme CCMissionControl \
            -configuration Release \
            -archivePath CCMissionControl.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }}

      - name: Export
        run: |
          xcodebuild -exportArchive \
            -archivePath CCMissionControl.xcarchive \
            -exportPath export \
            -exportOptionsPlist exportOptions.plist

      - name: Create zip
        run: ditto -c -k --keepParent export/CCMissionControl.app CCMissionControl.zip

      - name: Store API key
        env:
          NOTARIZE_API_KEY_CONTENT: ${{ secrets.NOTARIZE_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/private_keys
          echo "$NOTARIZE_API_KEY_CONTENT" > ~/private_keys/AuthKey.p8

      - name: Notarize
        run: |
          xcrun notarytool submit CCMissionControl.zip \
            --key ~/private_keys/AuthKey.p8 \
            --key-id "${{ secrets.NOTARIZE_API_KEY }}" \
            --issuer "${{ secrets.NOTARIZE_API_ISSUER }}" \
            --wait

      - name: Staple
        run: xcrun stapler staple export/CCMissionControl.app

      - name: Re-create zip with stapled app
        run: |
          rm CCMissionControl.zip
          ditto -c -k --keepParent export/CCMissionControl.app CCMissionControl.zip

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" CCMissionControl.zip \
            --clobber

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
